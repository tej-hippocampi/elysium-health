<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Care Guide | CareGuide</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orb-primary: #4A9EBF;
      --orb-secondary: #2D7D9A;
      --listening: #52B788;
      --speaking: #74B3CE;
      --bg: #0D1B2A;
      --surface: #112240;
      --text: #E0E6ED;
      --text-dim: #8892A4;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ──────────────────────────── */
    .header {
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; color: var(--orb-primary); }
    .logo-icon { width: 30px; height: 30px; background: var(--orb-primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; font-weight: 700; }
    .back-btn { color: var(--text-dim); text-decoration: none; font-size: 13px; font-weight: 500; }
    .back-btn:hover { color: var(--text); }

    /* ── Main Layout ─────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 24px; max-width: 600px; margin: 0 auto; width: 100%; }

    .patient-info { text-align: center; margin-bottom: 20px; }
    .patient-info h2 { font-size: 14px; font-weight: 500; color: var(--text-dim); }
    .patient-info h1 { font-size: 20px; font-weight: 700; color: var(--text); margin-top: 4px; }

    /* ── Orb Avatar ──────────────────────── */
    .orb-container {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 16px auto 24px;
    }

    .orb-glow {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(74,158,191,.2) 0%, transparent 70%);
      animation: glow-pulse 4s ease-in-out infinite;
    }

    .orb {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, var(--orb-primary), var(--orb-secondary));
      position: relative;
      box-shadow: 0 0 40px rgba(74,158,191,.3), inset 0 -4px 12px rgba(0,0,0,.3);
      animation: orb-breathe 4s ease-in-out infinite;
      transition: box-shadow .5s, background .5s;
    }

    .orb-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: border-color .3s, transform .3s;
    }

    .orb-inner-highlight {
      position: absolute;
      top: 20%;
      left: 25%;
      width: 35%;
      height: 25%;
      background: radial-gradient(ellipse, rgba(255,255,255,.25), transparent);
      border-radius: 50%;
    }

    /* Orb States */
    .orb-container[data-state="idle"] .orb { animation: orb-breathe 4s ease-in-out infinite; }
    .orb-container[data-state="idle"] .orb-glow { animation: glow-pulse 4s ease-in-out infinite; }

    .orb-container[data-state="listening"] .orb {
      animation: orb-breathe 1.5s ease-in-out infinite;
      box-shadow: 0 0 50px rgba(82,183,136,.4), inset 0 -4px 12px rgba(0,0,0,.3);
    }
    .orb-container[data-state="listening"] .orb-ring {
      border-color: var(--listening);
      animation: ring-pulse 1.2s ease-in-out infinite;
    }
    .orb-container[data-state="listening"] .orb-glow {
      background: radial-gradient(circle, rgba(82,183,136,.25) 0%, transparent 70%);
      animation: glow-pulse 1.5s ease-in-out infinite;
    }

    .orb-container[data-state="thinking"] .orb {
      animation: orb-breathe 2s ease-in-out infinite;
    }
    .orb-container[data-state="thinking"] .orb-ring {
      border-color: rgba(255,255,255,.2);
      animation: ring-spin 2s linear infinite;
    }

    .orb-container[data-state="speaking"] .orb {
      animation: orb-breathe 2s ease-in-out infinite;
      box-shadow: 0 0 60px rgba(116,179,206,.5), inset 0 -4px 12px rgba(0,0,0,.3);
      background: radial-gradient(circle at 35% 35%, #5BB5D5, var(--orb-primary));
    }
    .orb-container[data-state="speaking"] .orb-glow {
      background: radial-gradient(circle, rgba(116,179,206,.3) 0%, transparent 70%);
      animation: glow-pulse 1s ease-in-out infinite;
    }

    @keyframes orb-breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    @keyframes glow-pulse {
      0%, 100% { opacity: .6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }
    @keyframes ring-pulse {
      0%, 100% { transform: scale(1); opacity: .7; }
      50% { transform: scale(1.06); opacity: 1; }
    }
    @keyframes ring-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Sound wave bars (speaking state) */
    .sound-waves {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      height: 24px;
      margin-top: 12px;
      opacity: 0;
      transition: opacity .3s;
    }
    .orb-container[data-state="speaking"] ~ .sound-waves,
    .orb-container[data-state="listening"] ~ .sound-waves { opacity: 1; }

    .wave-bar {
      width: 4px;
      background: var(--orb-primary);
      border-radius: 2px;
      animation: wave 1s ease-in-out infinite;
    }
    .orb-container[data-state="listening"] ~ .sound-waves .wave-bar { background: var(--listening); }
    .wave-bar:nth-child(1) { animation-delay: 0s; }
    .wave-bar:nth-child(2) { animation-delay: .1s; }
    .wave-bar:nth-child(3) { animation-delay: .2s; }
    .wave-bar:nth-child(4) { animation-delay: .3s; }
    .wave-bar:nth-child(5) { animation-delay: .4s; }
    .wave-bar:nth-child(6) { animation-delay: .3s; }
    .wave-bar:nth-child(7) { animation-delay: .2s; }

    @keyframes wave {
      0%, 100% { height: 6px; }
      50% { height: 22px; }
    }

    /* ── Status Text ─────────────────────── */
    .status { text-align: center; font-size: 13px; color: var(--text-dim); margin: 12px 0 20px; min-height: 20px; }

    /* ── Chat Transcript ─────────────────── */
    .transcript {
      flex: 1;
      width: 100%;
      overflow-y: auto;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 280px;
      scroll-behavior: smooth;
    }

    .msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; animation: msg-in .3s ease-out; }
    .msg-patient { align-self: flex-end; background: var(--orb-primary); color: #fff; border-bottom-right-radius: 4px; }
    .msg-assistant { align-self: flex-start; background: var(--surface); color: var(--text); border: 1px solid rgba(255,255,255,.08); border-bottom-left-radius: 4px; }
    .msg-system { align-self: center; font-size: 12px; color: var(--text-dim); font-style: italic; }

    @keyframes msg-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Mic Button ──────────────────────── */
    .controls { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; padding-bottom: 16px; }

    .mic-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--orb-primary), var(--orb-secondary));
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .15s, box-shadow .15s, background .3s;
      box-shadow: 0 4px 16px rgba(74,158,191,.3);
    }
    .mic-btn:hover { transform: scale(1.06); box-shadow: 0 6px 24px rgba(74,158,191,.4); }
    .mic-btn:active { transform: scale(.95); }
    .mic-btn.active { background: linear-gradient(135deg, #dc3545, #b02a37); box-shadow: 0 4px 16px rgba(220,53,69,.4); }
    .mic-btn:disabled { opacity: .4; cursor: not-allowed; }

    .mic-hint { font-size: 12px; color: var(--text-dim); }

    /* ── Live Transcript ─────────────────── */
    .live-transcript {
      width: 100%;
      min-height: 36px;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 14px;
      color: var(--text-dim);
      font-style: italic;
      text-align: center;
      display: none;
    }
    .live-transcript.active { display: block; }

    /* ── Responsive ──────────────────────── */
    @media (max-width: 480px) {
      .orb-container { width: 140px; height: 140px; }
      .orb { width: 140px; height: 140px; }
      .transcript { max-height: 200px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon">+</div>
      <span>CareGuide</span>
    </div>
    <a href="javascript:history.back()" class="back-btn">← Back to Dashboard</a>
  </div>

  <div class="main">
    <div class="patient-info">
      <h2>Voice Care Guide for</h2>
      <h1 id="patientName">Patient</h1>
    </div>

    <div class="orb-container" id="orbContainer" data-state="idle">
      <div class="orb-glow"></div>
      <div class="orb">
        <div class="orb-ring"></div>
        <div class="orb-inner-highlight"></div>
      </div>
    </div>
    <div class="sound-waves">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>

    <div class="status" id="status">Tap the mic to start talking</div>

    <div class="live-transcript" id="liveTranscript"></div>

    <div class="transcript" id="transcript">
      <div class="msg msg-assistant">Hi! I'm your voice care guide. I've reviewed your discharge materials. Tap the mic and ask me anything about your recovery.</div>
    </div>

    <div class="controls">
      <button class="mic-btn" id="micBtn" aria-label="Toggle microphone">🎙</button>
      <span class="mic-hint" id="micHint">Tap to speak</span>
    </div>
  </div>

  <script>
    const PATIENT = window.__PATIENT__ || { id: 'maria_001', name: 'Maria L.', firstName: 'Maria' };
    const API = window.location.origin;

    const orbContainer = document.getElementById('orbContainer');
    const statusEl     = document.getElementById('status');
    const transcript   = document.getElementById('transcript');
    const micBtn       = document.getElementById('micBtn');
    const micHint      = document.getElementById('micHint');
    const liveEl       = document.getElementById('liveTranscript');

    let conversationHistory = [];
    let isListening = false;
    let recognition = null;
    let currentAudio = null;

    document.getElementById('patientName').textContent = PATIENT.name || 'Patient';

    // ── Speech Recognition Setup ─────────────
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      statusEl.textContent = 'Speech recognition not supported in this browser. Try Chrome.';
      micBtn.disabled = true;
    }

    function createRecognition() {
      const r = new SpeechRecognition();
      r.continuous = false;
      r.interimResults = true;
      r.lang = 'en-US';

      r.onstart = () => {
        isListening = true;
        setState('listening');
        statusEl.textContent = 'Listening...';
        micBtn.classList.add('active');
        micHint.textContent = 'Tap to stop';
        liveEl.classList.add('active');
        liveEl.textContent = '';
      };

      r.onresult = (e) => {
        let interim = '';
        let final = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) {
            final += e.results[i][0].transcript;
          } else {
            interim += e.results[i][0].transcript;
          }
        }
        liveEl.textContent = final || interim;
        if (final) {
          handleUserMessage(final.trim());
        }
      };

      r.onerror = (e) => {
        if (e.error !== 'no-speech' && e.error !== 'aborted') {
          addMessage(`Mic error: ${e.error}`, 'system');
        }
        stopListening();
      };

      r.onend = () => {
        stopListening();
      };

      return r;
    }

    // ── Mic Button ───────────────────────────
    micBtn.addEventListener('click', () => {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }

      if (isListening) {
        recognition?.stop();
      } else {
        recognition = createRecognition();
        recognition.start();
      }
    });

    function stopListening() {
      isListening = false;
      micBtn.classList.remove('active');
      micHint.textContent = 'Tap to speak';
      liveEl.classList.remove('active');
    }

    // ── Conversation Flow ────────────────────
    async function handleUserMessage(text) {
      if (!text) return;
      stopListening();

      addMessage(text, 'patient');
      conversationHistory.push({ role: 'user', content: text });

      // Keep rolling window of last 10 exchanges
      if (conversationHistory.length > 20) {
        conversationHistory = conversationHistory.slice(-20);
      }

      setState('thinking');
      statusEl.textContent = 'Thinking...';

      try {
        const res = await fetch(`${API}/api/avatar/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            patient_id: PATIENT.id,
            message: text,
            conversation_history: conversationHistory.slice(0, -1),
          }),
        });

        const data = await res.json();
        const reply = data.response;

        conversationHistory.push({ role: 'assistant', content: reply });
        addMessage(reply, 'assistant');

        // Play audio if available from ElevenLabs
        if (data.audio_url) {
          setState('speaking');
          statusEl.textContent = 'Speaking...';
          await playAudio(data.audio_url);
        } else {
          // Fallback to browser TTS
          setState('speaking');
          statusEl.textContent = 'Speaking...';
          await speakBrowser(reply);
        }

        setState('idle');
        statusEl.textContent = 'Tap the mic to continue';

      } catch (err) {
        setState('idle');
        statusEl.textContent = 'Connection error. Try again.';
        addMessage('I had trouble connecting. Please try again.', 'system');
      }
    }

    // ── Audio Playback ───────────────────────
    function playAudio(url) {
      return new Promise((resolve) => {
        currentAudio = new Audio(url);
        currentAudio.addEventListener('ended', () => { currentAudio = null; resolve(); });
        currentAudio.addEventListener('error', () => { currentAudio = null; resolve(); });
        currentAudio.play().catch(() => {
          currentAudio = null;
          resolve();
        });
      });
    }

    // ── Browser TTS Fallback ─────────────────
    function speakBrowser(text) {
      return new Promise((resolve) => {
        if (!window.speechSynthesis) { resolve(); return; }
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 0.9;
        utter.pitch = 1.0;
        utter.onend = resolve;
        utter.onerror = resolve;
        speechSynthesis.speak(utter);
      });
    }

    // ── UI Helpers ───────────────────────────
    function setState(state) {
      orbContainer.dataset.state = state;
    }

    function addMessage(text, role) {
      const el = document.createElement('div');
      el.className = `msg msg-${role}`;
      el.textContent = text;
      transcript.appendChild(el);
      transcript.scrollTop = transcript.scrollHeight;
    }
  </script>
</body>
</html>
